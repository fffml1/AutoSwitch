[EN]
; Pipe-delimited list of processes that auto-switch to English
; Add more separated by |
list=WindowsTerminal.exe|powershell.exe|pwsh.exe|Code.exe|idea64.exe

[ZH]
; Pipe-delimited list of processes that force Chinese (optional)
; list=notepad.exe

[EN_Title]
; Window titles (substring match) that switch to English
; list=

[ZH_Title]
; Window titles (substring match) that force Chinese
; list=

[Settings]
; Polling interval: how often to check the active window (milliseconds)
poll_interval=300
; Cooldown: minimum time between IME switches to prevent flicker (milliseconds)
cooldown=500
; Enable wildcard/glob matching for rules (* = any chars, ? = single char)
use_wildcard=0
